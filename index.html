<form id="orderForm">
  <label>Full Name
    <input required id="customerName" type="text" placeholder="Your name" />
  </label>

  <label>Email
    <input required id="customerEmail" type="email" placeholder="you@email.com" />
  </label>

  <label>Phone Number
    <input required id="customerPhone" type="text" placeholder="09xxxxxxxxx" />
  </label>

  <label>Address
    <textarea required id="customerAddress" placeholder="Delivery address"></textarea>
  </label>

  <label>Payment Method
    <select id="paymentMethod">
      <option>Cash on Delivery</option>
      <option>GCash</option>
      <option>Maya</option>
    </select>
  </label>

  <label>Payment Reference Number
    <input id="paymentReference" type="text" placeholder="GCash/Maya reference number or COD" />
  </label>

  <button class="main-btn full" type="submit">Place Order</button>
</form>
